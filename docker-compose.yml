name: construction-analyzer

networks:
  default:
    name: construction-analyzer-net

volumes:
  postgres-data:
  ollama-data:
  backend-state:

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: construction
      POSTGRES_PASSWORD: construction
      POSTGRES_DB: memory_palace
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construction -d memory_palace"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || curl -fsS http://localhost:11434/api/tags >/dev/null"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend:
    build:
      context: ./backend
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
      MEMORY_PALACE_DATABASE_URL: postgresql://construction:construction@postgres:5432/memory_palace
      MEMORY_PALACE_EMBEDDING_MODEL: ${MEMORY_PALACE_EMBEDDING_MODEL:-nomic-embed-text}
      MEMORY_PALACE_LLM_MODEL: ${MEMORY_PALACE_LLM_MODEL:-qwen3:1.7b}
      MEMORY_PALACE_INSTANCE_ID: construction-analyzer
      CHECKPOINT_DB_PATH: /app/data/checkpoints.sqlite
      DOCUMENTS_DIR: /app/data/documents
      KB_BACKEND: ${KB_BACKEND:-memorypalace}
    volumes:
      - ./backend/data/documents:/app/data/documents
      - backend-state:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
